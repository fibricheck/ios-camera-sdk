name: PR Validation

on:
  pull_request:
    branches: [main, master, dev]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SDK unit tests
        run: |
          UDID=$(xcrun simctl list devices available --json | \
            jq -r '[.devices | to_entries[] | select(.key | test("iOS")) | .value[]] |
                   map(select(.name | test("iPhone"))) | first | .udid')
          xcodebuild test -scheme FibriCheckCameraSDK -destination "id=$UDID"

      - name: Run TestSequence unit tests
        run: |
          UDID=$(xcrun simctl list devices available --json | \
            jq -r '[.devices | to_entries[] | select(.key | test("iOS")) | .value[]] |
                   map(select(.name | test("iPhone"))) | first | .udid')
          xcodebuild test -project examples/FibriCheckTestSequence/FibriCheckTestSequence.xcodeproj -scheme FibriCheckTestSequence -destination "id=$UDID"

      - name: Build SPM example
        run: |
          cd examples/FibriCheckExample
          xcodebuild -scheme FibriCheckExample -target FibriCheckExample -destination 'generic/platform=iOS' CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
