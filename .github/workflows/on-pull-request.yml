name: PR Validation

on:
  pull_request:
    branches: [main, master, dev]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SDK unit tests
        run: |
          xcodebuild test -scheme FibriCheckCameraSDK -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Run TestSequence unit tests
        run: |
          xcodebuild test -project examples/FibriCheckTestSequence/FibriCheckTestSequence.xcodeproj -scheme FibriCheckTestSequence -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Build SPM example
        run: |
          cd examples/FibriCheckExample
          xcodebuild -scheme FibriCheckExample -target FibriCheckExample -destination 'generic/platform=iOS' CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
